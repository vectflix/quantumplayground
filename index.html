<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Playground | Unified Suite</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <header class="glass-nav">
        <div class="nav-content">
            <h1>Quantum<span>Playground</span></h1>
            <div class="controls">
                <input type="text" id="searchBar" placeholder="Search topics..." onkeyup="filterContent()">
                <select id="subjectFilter" onchange="filterContent()">
                    <option value="all">All Subjects</option>
                    <option value="physics">Physics</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="biology">Biology</option>
                </select>
            </div>
        </div>
    </header>

    <main id="content-grid" class="grid-layout"></main>

    <script src="notes.js"></script>
    <script src="videos.js"></script>
    <script src="sims.js"></script>

    <script>
        function buildLab() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            window.NOTES_DATA.forEach((topic, i) => {
                const card = document.createElement('article');
                card.className = `note-card ${topic.subject}`;
                card.setAttribute('data-subject', topic.subject);
                
                card.innerHTML = `
                    <div class="badge">${topic.subject}</div>
                    <h3>${topic.title}</h3>
                    <div class="content-text">${topic.text}</div>
                    <div class="equation-block">${topic.math}</div>
                    <iframe class="video-frame" src="https://www.youtube.com/embed/${window.VIDEOS_DATA[i].ytID}" loading="lazy" allowfullscreen></iframe>
                    <div class="sim-box">
                        <p class="sim-label">🔬 Interactive Simulation</p>
                        <iframe src="${window.SIMS_DATA[i].url}" class="phet-sim"></iframe>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterContent() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const subject = document.getElementById('subjectFilter').value;
            const cards = document.querySelectorAll('.note-card');

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                const cardSubject = card.getAttribute('data-subject');
                const matchesSearch = text.includes(query);
                const matchesSubject = subject === 'all' || cardSubject === subject;
                
                card.style.display = (matchesSearch && matchesSubject) ? 'flex' : 'none';
            });
        }

        window.onload = buildLab;
    </script>
</body>
</html>
