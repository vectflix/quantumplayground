<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Playground | Modular Suite</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <header class="glass-nav">
        <h1>Quantum<span>Playground</span></h1>
        <div id="user-stats">Level 1 | 0 XP</div>
    </header>

    <main id="content-grid" class="grid-layout">
        </main>

    <script>
        // THE LOADER ENGINE
        async function buildLab() {
            const grid = document.getElementById('content-grid');
            
            // We combine data from your 3 specific files
            const [notes, videos, sims] = [window.NOTES_DATA, window.VIDEOS_DATA, window.SIMS_DATA];

            notes.forEach((topic, index) => {
                const card = document.createElement('article');
                card.className = `note-card ${topic.subject}`;
                
                card.innerHTML = `
                    <div class="badge">${topic.subject.toUpperCase()}</div>
                    <h3>${topic.title}</h3>
                    <p>${topic.text}</p>
                    <div class="equation-block">${topic.math}</div>
                    
                    <iframe class="video-frame" src="https://www.youtube.com/embed/${videos[index].ytID}" loading="lazy"></iframe>
                    
                    <div class="sim-box">
                        <p>🔬 Interactive Lab:</p>
                        <iframe src="${sims[index].url}" class="phet-sim"></iframe>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        // Run when files are loaded
        window.onload = buildLab;
    </script>
    
    <script src="notes.js"></script>
    <script src="videos.js"></script>
    <script src="sims.js"></script>
</body>
</html>
